<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>老師即時監控</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      padding: 30px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    .title {
      text-align: center;
      font-size: 42px;
      font-weight: bold;
      margin-bottom: 30px;
      color: #222;
    }

    .chart-card {
      background: white;
      padding: 30px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    canvas {
      width: 100% !important;
      height: 600px !important;
    }

    .button {
      font-size: 24px;
      padding: 20px;
      margin-bottom: 20px;
    }
    
  </style>
</head>
<body>    

<div class="container">
  <div class="title">📊未來資產預測圖</div>

<div style="text-align:center; margin-bottom:20px;">
    <button onclick="unlockSubmit()" style="
      background:#059669;
      color:white;
      border:none;
      padding:16px 28px;
      font-size:20px;
      border-radius:16px;
      cursor:pointer;
      font-weight:bold;
      box-shadow:0 6px 16px rgba(0,0,0,0.15);
      margin-right:12px;
    ">
      🔓 開放學生再次送出
    </button>
    <button onclick="clearData()" style="
      background:#dc2626;
      color:white;
      border:none;
      padding:16px 28px;
      font-size:20px;
      border-radius:16px;
      cursor:pointer;
      font-weight:bold;
      box-shadow:0 6px 16px rgba(0,0,0,0.15);
    ">
      🗑️ 清空所有資料
    </button>
  <div class="chart-card">
    <canvas id="chart"></canvas>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCe-jBtC9oKmkV3yAqVc8s7BnbbUtUQcJI",
    authDomain: "dakan-test.firebaseapp.com",
    databaseURL: "https://dakan-test-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "dakan-test",
    storageBucket: "dakan-test.firebasestorage.app",
    messagingSenderId: "22981315033",
    appId: "1:22981315033:web:751f22af1f1f7eecf5f1c8"
  };

  firebase.initializeApp(firebaseConfig);

  const db = firebase.database();

  const ctx = document.getElementById('chart').getContext('2d');

  const customYAxisTitle = {
    id: 'customYAxisTitle',
    beforeLayout: (chart, args, opts) => {
      const {
        display,
        font
      } = opts;
      if (!display) {
        return;
      }
  
      const {
        ctx
      } = chart;
      ctx.font = font || 'bold 20px "Helvetica Neue", Helvetica, Arial, sans-serif'
  
      const {
        width
      } = ctx.measureText(opts.text);
      chart.options.layout.padding.left = width * 1.1;
    },
    afterDraw: (chart, args, opts) => {
      const {
        font,
        text,
        color
      } = opts;
      const {
        ctx,
        chartArea: {
          top,
          bottom,
          left,
          right
        }
      } = chart;
  
      if (opts.display) {
        ctx.fillStyle = color || Chart.defaults.color
        ctx.font = font || 'bold 20px "Helvetica Neue", Helvetica, Arial, sans-serif, bold'
        ctx.fillText(text, 3, (top + bottom) / 2)
      }
    }
  };
    
  const chart = new Chart(ctx, {
    type: 'line',
    plugins: [customYAxisTitle],
    data: {
      labels: [],
      datasets: [
        {
          label: '第1組',
          data: [],
          borderColor: '#ef4444',
          tension: 0.3
        },
        {
          label: '第2組',
          data: [],
          borderColor: '#3b82f6',
          tension: 0.3
        },
        {
          label: '第3組',
          data: [],
          borderColor: '#10b981',
          tension: 0.3
        },
        {
          label: '第4組',
          data: [],
          borderColor: '#f59e0b',
          tension: 0.3
        },
        {
          label: '第5組',
          data: [],
          borderColor: '#8b5cf6',
          tension: 0.3
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          labels: {
            font: {
              size: 18
            }
          }
        },
        customYAxisTitle: {
          display: true,
          text: '總資產',
          padding: { top: -15, left: 15 },
        },        
      },
      scales: {
        x: {
          title: {
            display: true,
            text: '時間(年)',
            font: {
              size: 20,
              weight: 'bold'
            }
          }
        },        
        y: {
          beginAtZero: true,
          title: { display: false }
        }
      }
    }
  });

  let count = 0;

  db.ref('scores').on('child_added', snapshot => {
    const data = snapshot.val();
    
    var baseValueA = data.valueA;
    var baseValueB = data.valueB;
    var baseValueC = data.valueC;

    if (data.submitCount == 1) {
      if (
        !chart.data.labels ||
        chart.data.labels.length === 0
      ) {
        chart.data.labels.push(0);
      }
      const groupIndex = Number(data.group) - 1;
      chart.data.datasets[groupIndex].data[0] = data.valueA + data.valueB + data.valueC;
    }

    let weightedData = [];
    
    for (var i = 1; i < 6; i++) {
      if ((chart.data.labels.length - 1) < i + (data.submitCount-1)*5) {
        chart.data.labels.push(i + (data.submitCount-1)*5);
      }
    
      const groupIndex = Number(data.group) - 1;

      if (data.calculated) {
        chart.data.datasets[groupIndex].data[i+(data.submitCount-1)*5] = data.yValues[i-1];
      } else {
        let random1 = getRandom(80, 120); // 80%~120%
        let random2 = getRandom(90, 110); // 90%~110%
        let random3 = getRandom(103, 103); // 103%~103%

        baseValueA = (baseValueA * random1)/100;
        baseValueB = (baseValueB * random2)/100;
        baseValueC = (baseValueC * random3)/100;

        let total = parseInt(baseValueA+baseValueB+baseValueC);

        weightedData.push(total)
        chart.data.datasets[groupIndex].data[i+(data.submitCount-1)*5] = total;

        snapshot.ref.update({
            yValues: weightedData,
            calculated: true
        });    
      }
    }

    chart.update();

  });

//  db.ref('scores').on('child_added', snapshot => {
//    const data = snapshot.val();

//    count++;

//    chart.data.labels.push(count);

//    chart.data.datasets.forEach(dataset => {
//      dataset.data.push(null);
//    });

//    const groupIndex = Number(data.group) - 1;

//    chart.data.datasets[groupIndex].data[count - 1] = data.valueA * 1.1 + data.valueB * 1.2 + data.valueC *1.3;

//    chart.update();
//  });

  function unlockSubmit() {
    for (let i = 1; i <= 5; i++) {
      db.ref(`control/${i}`).set(true);
    }

    alert("已重新開放學生送出");
  }
  
  function clearData(){
    db.ref('scores').remove();
    db.ref('control').remove();

    chart.data.labels = [];

    chart.data.datasets.forEach(dataset => {
      dataset.data = [];
    });

    count = 0;

    chart.update();
  }

  function getRandom( min, max ) {
      var random = Math.floor( Math.random() * (max + 1 - min) ) + min;
    
      return random;
  }  
</script>

</body>
</html>
